<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Defect Report Tracker — Industrial Quality Control Dashboard" />
    <title>Defect Report Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/cropper.min.css" />
    <script>
      // Restore path from 404.html redirect (GitHub Pages SPA fix)
      (function() {
        var p = new URLSearchParams(window.location.search).get('p');
        if (p) {
          window.history.replaceState(
            null, '',
            window.location.pathname + decodeURIComponent(p) + window.location.hash
          );
        }
      })();
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
